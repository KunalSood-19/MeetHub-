<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>MeetHub+</title>

<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;700;800&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet"/>

<style>
*{margin:0;padding:0;box-sizing:border-box}

:root{
--bg:#07080f;
--card:#0f1117;
--line:#1b1f2d;
--text:#eef2ff;
--muted:#7d8597;
--green:#4ade80;
--cyan:#22d3ee;
--red:#fb7185;
}

body{
font-family:"DM Sans",sans-serif;
background:var(--bg);
color:var(--text);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
overflow:hidden;
padding:20px;
}

/* background */
body::before{
content:"";
position:fixed;
inset:0;
background:
radial-gradient(circle at top left, rgba(74,222,128,.12), transparent 35%),
radial-gradient(circle at bottom right, rgba(34,211,238,.12), transparent 35%);
z-index:0;
}

.grid{
position:fixed;
inset:0;
background-image:
linear-gradient(rgba(255,255,255,.03) 1px, transparent 1px),
linear-gradient(90deg, rgba(255,255,255,.03) 1px, transparent 1px);
background-size:42px 42px;
z-index:0;
}

.card{
position:relative;
z-index:2;
width:100%;
max-width:500px;
background:rgba(15,17,23,.92);
backdrop-filter:blur(14px);
border:1px solid var(--line);
border-radius:24px;
padding:34px;
box-shadow:0 30px 80px rgba(0,0,0,.55);
}

.logo{
display:flex;
align-items:center;
gap:14px;
margin-bottom:28px;
}

.logo-icon{
width:54px;
height:54px;
border-radius:18px;
display:flex;
align-items:center;
justify-content:center;
font-size:26px;
background:linear-gradient(135deg,var(--green),var(--cyan));
color:#08110d;
font-weight:800;
}

.logo-text h1{
font-family:"Syne",sans-serif;
font-size:26px;
font-weight:800;
letter-spacing:-.5px;
}

.logo-text span{
font-size:11px;
letter-spacing:.18em;
font-weight:700;
color:var(--green);
}

.title{
font-family:"Syne",sans-serif;
font-size:30px;
line-height:1.15;
margin-bottom:8px;
}

.sub{
font-size:14px;
color:var(--muted);
margin-bottom:28px;
line-height:1.6;
}

.field{
margin-bottom:16px;
}

label{
display:block;
font-size:11px;
font-weight:700;
letter-spacing:.12em;
text-transform:uppercase;
color:var(--muted);
margin-bottom:8px;
}

input{
width:100%;
height:50px;
padding:0 16px;
border-radius:14px;
border:1px solid var(--line);
background:#090b12;
color:var(--text);
font-size:15px;
outline:none;
transition:.2s;
}

input:focus{
border-color:var(--green);
box-shadow:0 0 0 4px rgba(74,222,128,.08);
}

.row{
display:flex;
gap:10px;
}

.row input{
flex:1;
}

.btn{
height:50px;
border:none;
border-radius:14px;
padding:0 18px;
cursor:pointer;
font-family:"Syne",sans-serif;
font-size:15px;
font-weight:700;
transition:.2s;
}

.primary{
width:100%;
background:linear-gradient(135deg,var(--green),#34d399);
color:#041108;
}

.primary:hover{
transform:translateY(-1px);
filter:brightness(1.04);
}

.secondary{
background:#111522;
color:var(--text);
border:1px solid var(--line);
}

.secondary:hover{
border-color:var(--cyan);
color:var(--cyan);
}

.divider{
display:flex;
align-items:center;
gap:10px;
margin:16px 0;
color:var(--muted);
font-size:12px;
}

.divider::before,
.divider::after{
content:"";
height:1px;
flex:1;
background:var(--line);
}

.toggle{
display:flex;
align-items:center;
gap:8px;
font-size:13px;
color:var(--muted);
cursor:pointer;
margin-bottom:14px;
user-select:none;
}

.toggle:hover{
color:var(--text);
}

.adv{
display:none;
}

.adv.show{
display:block;
}

.err{
margin-top:6px;
font-size:13px;
color:var(--red);
display:none;
}

.err.show{
display:block;
}

.quick{
margin-top:22px;
display:grid;
grid-template-columns:repeat(3,1fr);
gap:10px;
}

.mini{
padding:12px;
border-radius:14px;
background:#0d111b;
border:1px solid var(--line);
text-align:center;
font-size:12px;
color:var(--muted);
}

@media(max-width:520px){
.card{padding:24px}
.title{font-size:26px}
.quick{grid-template-columns:1fr}
.row{flex-direction:column}
}
</style>
</head>

<body>

<div class="grid"></div>

<div class="card">

<div class="logo">
<div class="logo-icon">🎥</div>
<div class="logo-text">
<h1>MeetHub+</h1>
<span>POWERED BY AI</span>
</div>
</div>

<div class="title">Start or Join a Meeting</div>
<div class="sub">
HD Video • Waiting Room • AI Notes • Whiteboard • Host Controls
</div>

<div class="field">
<label>Your Name</label>
<input id="nameInput" placeholder="e.g. Kunal Sood" autocomplete="off">
</div>

<div class="field">
<label>Room ID</label>
<div class="row">
<input id="roomInput" placeholder="e.g. abc-defg-hij">
<button class="btn secondary" onclick="genRoom()">Random</button>
</div>
</div>

<div class="toggle" onclick="toggleAdv()">
<span id="arrow">▶</span>
Advanced Options
</div>

<div class="adv" id="advPanel">

<div class="field">
<label>Room Password (optional)</label>
<input id="passInput" type="password" placeholder="Leave blank if not needed">
</div>

</div>

<div class="err" id="err"></div>

<button class="btn primary" onclick="joinRoom()">
Join Meeting →
</button>

<div class="divider">or</div>

<button class="btn secondary" style="width:100%" onclick="newRoom()">
Create New Room
</button>

<div class="quick">
<div class="mini">🔒 Secure Rooms</div>
<div class="mini">⚡ Fast Join</div>
<div class="mini">🤖 AI Powered</div>
</div>

</div>

<script>

const saved = localStorage.getItem("meetapp-name");
if(saved){
document.getElementById("nameInput").value = saved;
}

const p = new URLSearchParams(location.search);
if(p.get("room")){
document.getElementById("roomInput").value = p.get("room");
}

/* random code like abc-defg-hij */
function part(len){
const chars = "abcdefghijklmnopqrstuvwxyz";
let out = "";
for(let i=0;i<len;i++){
out += chars[Math.floor(Math.random()*chars.length)];
}
return out;
}

function genRoom(){
document.getElementById("roomInput").value =
part(3) + "-" + part(4) + "-" + part(3);
}

function toggleAdv(){
const panel = document.getElementById("advPanel");
const arrow = document.getElementById("arrow");

panel.classList.toggle("show");
arrow.textContent = panel.classList.contains("show") ? "▼" : "▶";
}

function showErr(msg){
const e = document.getElementById("err");
e.textContent = msg;
e.classList.add("show");
}

function clearErr(){
document.getElementById("err").classList.remove("show");
}

function joinRoom(){

clearErr();

const name = document.getElementById("nameInput").value.trim();
const room = document.getElementById("roomInput").value.trim();
const pass = document.getElementById("passInput").value.trim();

if(!name){
showErr("Please enter your name");
return;
}

if(!room){
showErr("Please enter Room ID");
return;
}

localStorage.setItem("meetapp-name", name);

location.href =
"/room?room=" +
encodeURIComponent(room) +
"&name=" +
encodeURIComponent(name) +
"&pass=" +
encodeURIComponent(pass);
}

function newRoom(){

const name = document.getElementById("nameInput").value.trim();

if(!name){
showErr("Please enter your name first");
return;
}

genRoom();
joinRoom();
}

document.addEventListener("keydown", e=>{
if(e.key==="Enter") joinRoom();
});

</script>

</body>
</html>
